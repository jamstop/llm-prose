name: auto version bump

# Bumps the plugin version on merge to main, sized from conventional-commit
# prefixes (feat! -> major, feat -> minor, fix/docs/chore/refactor -> patch).
# Needed because Claude keys the install cache by version: no bump, no ship.
# The bump commit carries [skip ci] so it never re-triggers this or validate.

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'commands/**'
      - 'rules/**'
      - 'scripts/**'
      - 'README.md'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide bump size from conventional commits
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          type_of() {
            case "$1" in
              feat\(*\)!:*|feat!:*|*BREAKING\ CHANGE:*) echo major;;
              feat:*|feat\(*\):*)                       echo minor;;
              fix:*|fix\(*\):*|docs:*|docs\(*\):*|chore:*|chore\(*\):*|refactor:*|refactor\(*\):*) echo patch;;
              *) echo none;;
            esac
          }
          rank() { case "$1" in major) echo 3;; minor) echo 2;; patch) echo 1;; *) echo 0;; esac; }

          bump=none
          consider() { [ "$(rank "$1")" -gt "$(rank "$bump")" ] && bump="$1"; }

          subject=$(git log -1 --pretty=%s)
          consider "$(type_of "$subject")"

          # Squash/merge subjects look like "... (#123)"; pull the PR title too.
          pr=$(printf '%s' "$subject" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -n "$pr" ]; then
            title=$(gh pr view "$pr" --json title --jq .title 2>/dev/null || true)
            [ -n "$title" ] && consider "$(type_of "$title")"
          fi

          # Also scan the commits introduced by this push.
          while IFS= read -r m; do [ -n "$m" ] && consider "$(type_of "$m")"; done \
            < <(git log --pretty=%s HEAD~1..HEAD 2>/dev/null || true)

          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "decided: $bump"

      - name: Bump all manifests
        if: steps.decide.outputs.bump != 'none'
        run: |
          cur=$(jq -r '.version' .cursor-plugin/plugin.json)
          IFS=. read -r MA MI PA <<< "$cur"
          case "${{ steps.decide.outputs.bump }}" in
            major) new="$((MA+1)).0.0";;
            minor) new="$MA.$((MI+1)).0";;
            patch) new="$MA.$MI.$((PA+1))";;
          esac
          for f in .cursor-plugin/plugin.json .claude-plugin/plugin.json; do
            jq --arg v "$new" '.version=$v' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done
          jq --arg v "$new" '.plugins |= map(.version=$v)' .claude-plugin/marketplace.json > m.tmp \
            && mv m.tmp .claude-plugin/marketplace.json
          bash scripts/validate.sh
          echo "NEW=$new" >> "$GITHUB_ENV"
          echo "$cur -> $new"

      - name: Commit and tag
        if: steps.decide.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cursor-plugin/plugin.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to $NEW [skip ci]"
          git tag "llm-prose--v$NEW"
          git push origin HEAD --tags

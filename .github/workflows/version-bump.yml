name: auto version bump

# Bumps the plugin version when a PR merges, sized from the PR title's
# conventional-commit prefix (feat! -> major, feat -> minor, fix/docs/chore/
# refactor -> patch). Fires on pull_request:closed rather than push-to-main:
# squash merges don't reliably emit a push event, but the merged PR always does.
# Needed because Claude keys the install cache by version: no bump, no ship.
# The bump commit carries [skip ci] so it never re-triggers validate.

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      level:
        description: Bump level for a manual run
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  bump:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decide bump size
        id: decide
        run: |
          type_of() {
            case "$1" in
              feat\(*\)!:*|feat!:*|*BREAKING\ CHANGE:*) echo major;;
              feat:*|feat\(*\):*)                       echo minor;;
              fix:*|fix\(*\):*|docs:*|docs\(*\):*|chore:*|chore\(*\):*|refactor:*|refactor\(*\):*) echo patch;;
              *) echo none;;
            esac
          }
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            bump="${{ inputs.level }}"
          else
            bump=$(type_of "${{ github.event.pull_request.title }}")
          fi
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "decided: $bump"

      - name: Bump all manifests
        if: steps.decide.outputs.bump != 'none'
        run: |
          cur=$(jq -r '.version' .cursor-plugin/plugin.json)
          IFS=. read -r MA MI PA <<< "$cur"
          case "${{ steps.decide.outputs.bump }}" in
            major) new="$((MA+1)).0.0";;
            minor) new="$MA.$((MI+1)).0";;
            patch) new="$MA.$MI.$((PA+1))";;
          esac
          for f in .cursor-plugin/plugin.json .claude-plugin/plugin.json; do
            jq --arg v "$new" '.version=$v' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done
          jq --arg v "$new" '.plugins |= map(.version=$v)' .claude-plugin/marketplace.json > m.tmp \
            && mv m.tmp .claude-plugin/marketplace.json
          bash scripts/validate.sh
          echo "NEW=$new" >> "$GITHUB_ENV"
          echo "$cur -> $new"

      - name: Commit and tag
        if: steps.decide.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cursor-plugin/plugin.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to $NEW [skip ci]"
          git tag "llm-prose--v$NEW"
          git push origin HEAD:main --tags
